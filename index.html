<!DOCTYPE html>
<html>
<head>
    <title>Mahalaxmi Sweet Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍬 Santosh Sweet Shop</h1>
    <button onclick="openCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<section class="products">

    <div class="product">
        <h3>Gulab Jamun</h3>
        <p>₹200</p>
        <button onclick="addToCart('Gulab Jamun',200)">Add</button>
    </div>

    <div class="product">
        <h3>Kaju Katli</h3>
        <p>₹800</p>
        <button onclick="addToCart('Kaju Katli',800)">Add</button>
    </div>

    <div class="product">
        <h3>Laddu</h3>
        <p>₹350</p>
        <button onclick="addToCart('Laddu',350)">Add</button>
    </div>

</section>

<div id="cart-modal" class="cart-modal">
    <div class="cart-box">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <h3>Total: ₹<span id="total">0</span></h3>

        <button onclick="checkout()">Proceed to Payment</button>
        <button onclick="closeCart()">Close</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
