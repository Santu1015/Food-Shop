<!DOCTYPE html>
<html>
<head>
    <title>Sweet Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍬 Mahalaxmi Sweet Shop</h1>
        <button onclick="viewCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
    </header>

    <section class="products">

        <div class="product">
            <img src="https://via.placeholder.com/200" />
            <h3>Gulab Jamun</h3>
            <p>₹200 / kg</p>
            <button onclick="addToCart('Gulab Jamun',200)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" />
            <h3>Kaju Katli</h3>
            <p>₹800 / kg</p>
            <button onclick="addToCart('Kaju Katli',800)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" />
            <h3>Laddu</h3>
            <p>₹350 / kg</p>
            <button onclick="addToCart('Laddu',350)">Add to Cart</button>
        </div>

    </section>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <h3>Total: ₹<span id="total">0</span></h3>
            <button onclick="checkout()">Pay Now</button>
            <button onclick="closeCart()">Close</button>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
